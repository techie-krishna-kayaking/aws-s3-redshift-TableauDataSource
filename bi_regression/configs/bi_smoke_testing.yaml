# BI smoke testing config: validates fonts, font sizes, and colors in one dashboard.
test_type: "smoke"

smoke:
  dashboard_url: "https://prod-useast-b.online.tableau.com/#/site/infoblox/views/YourDashboard/YourView"
  ui_standards:
    fonts_allowed:
      - "Arial"
      - "Roboto"
      - "Segoe UI"
      - "Tableau Book"
      - "Tableau Light"
    font_sizes_allowed:
      - "10px"
      - "11px"
      - "12px"
      - "13px"
      - "14px"
      - "16px"
    colors_allowed:
      - "#FFFFFF"
      - "#000000"
      - "#4E79A7"
      - "#F28E2B"
      - "#E15759"
      - "#76B7B2"
      - "#59A14F"

browser:
  user_data_dir: "/Users/kkrishna/Library/Application Support/Microsoft Edge"
  profile_dir: "Default"
  headless: false
  page_load_timeout: 90000
  render_wait_seconds: 6
  max_retries: 3
  viewport_width: 1920
  viewport_height: 1080

output:
  base_dir: "test_results/bi_smoke"
