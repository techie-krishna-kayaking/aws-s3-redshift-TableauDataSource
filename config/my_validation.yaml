# Test configuration for local file validation
# Comparing v1_dev Q1 only (source) vs V2_preprod (target)
# v1_dev files filtered to 'October 2025' via filter_v1_q1.py
validations:
  - name: "Commercial_No_Rep_Management_Tokens"
    target:
      type: file
      path: ./raw_data/aleph_apr/V2_preprod/Commercial_Rep_Management_Tokens_FY26Q1.csv
    source:
      type: file
      path: "./raw_data/aleph_apr/v1_dev_q1/Commercial (No Rep) Management Tokens_fy25_26.csv"
    primary_keys: Account ID, Order Number, SKU, Service Start Date
    output_dir: ./results/alephv1v2_20260420

