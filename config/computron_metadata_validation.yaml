  - name: "Computron DOO Headers"
    regression: false
    source:
      type: file
      path: ./raw_data/computron/DOO_HEADERS_ALL.csv
      format: csv
    target:
      type: table
      environment: PREPROD
      schema: edw_asis
      table: oracle_fusion_dootop_header
