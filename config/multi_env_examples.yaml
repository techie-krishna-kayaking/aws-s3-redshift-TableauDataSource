# Multi-Environment Validation Examples
# Demonstrates using different Redshift environments

validations:
  # Example 1: Using DEV environment
  - name: "DEV - CSV to Table Validation"
    source:
      type: file
      path: ./data/dev_data.csv
    target:
      type: table
      environment: DEV  # Uses DEV_JDBC_URL, DEV_USER, DEV_PASSWORD from .env
      schema: edw_asis
      table: dev_table
    primary_keys: id
    output_dir: ./results
  
  # Example 2: Using DEV_REVOPS environment (different user on same instance)
  - name: "DEV RevOps - Table Comparison"
    source:
      type: table
      environment: DEV  # kkrishna user
      schema: edw_asis
      table: source_table
    target:
      type: table
      environment: DEV_REVOPS  # revops_test_qa user
      schema: edw_asis
      table: target_table
    primary_keys: customer_id
    output_dir: ./results
  
  # Example 3: Compare DEV vs PREPROD
  - name: "DEV to PREPROD Migration Check"
    source:
      type: table
      environment: DEV
      schema: staging
      table: customers
    target:
      type: table
      environment: PREPROD
      schema: staging
      table: customers
    primary_keys: customer_id
    output_dir: ./results
  
  # Example 4: Validate PREPROD before PROD deployment
  - name: "PREPROD to PROD Validation"
    source:
      type: table
      environment: PREPROD
      schema: production
      table: final_data
    target:
      type: table
      environment: PROD
      schema: production
      table: final_data
    primary_keys: record_id
    output_dir: ./results
  
  # Example 5: File to specific environment
  - name: "CSV to PROD Table"
    source:
      type: file
      path: ./data/production_upload.csv
    target:
      type: table
      environment: PROD
      schema: production
      table: import_table
    primary_keys: transaction_id
    output_dir: ./results
  
  # Example 6: Mix environment and direct config (advanced)
  - name: "Mixed Configuration Example"
    source:
      type: table
      environment: DEV  # Use environment config
      schema: edw_asis
      table: source_data
    target:
      type: table
      # Direct config (legacy mode)
      host: custom-cluster.redshift.amazonaws.com
      database: custom-db
      user: custom_user
      password: custom_pass
      port: 5439
      schema: public
      table: target_data
    primary_keys: id
    output_dir: ./results


# Universal Data Validation Framework
# Example configuration file demonstrating all 5 comparison scenarios

validations:
  # Scenario 1: File vs Redshift Table
  - name: "CSV to Redshift Validation"
    source:
      type: file
      path: ./data/source_data.csv  # Relative to project root
      format: csv  # Optional: auto-detected from extension
    target:
      type: table
      schema: edw_asis
      table: my_table_name
      # Redshift credentials loaded from .env file
    primary_keys: id,user_id  # Comma-separated primary keys
    output_dir: ./results
  
  # Scenario 2: Redshift Table vs Table
  - name: "Table to Table Comparison"
    source:
      type: table
      schema: edw_asis
      table: source_table
    target:
      type: table
      schema: edw_tobe
      table: target_table
    primary_keys: customer_id
    output_dir: ./results
  
  # Scenario 3: File vs File
  - name: "CSV to Parquet Validation"
    source:
      type: file
      path: ./data/source.csv
    target:
      type: file
      path: ./data/target.parquet
    primary_keys: id
    output_dir: ./results
  
  # Scenario 4: DataSource (TWBX) vs DataSource
  - name: "TWBX Comparison"
    source:
      type: datasource
      path: ./datasources/pre_rca_opp_historical.twbx
    target:
      type: datasource
      path: ./datasources/post_rca_opp_historical.twbx
    # No primary keys for datasource comparison
    output_dir: ./results
  
  # Scenario 5: DataSource vs Redshift Table
  - name: "TWBX to Table Validation"
    source:
      type: datasource
      path: ./datasources/my_datasource.twbx
      datasource_name: "Main Data"  # Optional: specific datasource to extract
    target:
      type: table
      schema: edw_asis
      table: tableau_data
    primary_keys: record_id
    output_dir: ./results
  
  # Additional Examples
  
  # JSON to Excel
  - name: "JSON to Excel Comparison"
    source:
      type: file
      path: ./data/api_response.json
      json_orient: records  # Optional: JSON orientation
    target:
      type: file
      path: ./data/excel_export.xlsx
      sheet_name: 0  # Optional: Excel sheet to read
    primary_keys: transaction_id
    output_dir: ./results
  
  # Parquet to Table (no primary key - row-by-row comparison)
  - name: "Parquet to Table (No PK)"
    source:
      type: file
      path: ./data/batch_data.parquet
    target:
      type: table
      schema: staging
      table: batch_import
    # No primary_keys - will compare row-by-row
    output_dir: ./results
